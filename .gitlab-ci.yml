stages:
  - build_dev
  - build_stag
  - build_prod
  - deploy_dev
  - deploy_stag
  - deploy_prod

# Caching node modules to speed up future builds
cache:
  paths:
    - node_modules/

# Build the dev project
build_dev:
  stage: build_dev
  image: node:20
  variables:
    VITE_BASE_URL: $VITE_BASE_URL_DEV
    VITE_FACEBOOK_APP_ID: $VITE_FACEBOOK_APP_ID_DEV
    VITE_FACEBOOK_CLIENT_SECRET: $VITE_FACEBOOK_CLIENT_SECRET_DEV
    VITE_GOOGLE_CLIENT_ID: $VITE_GOOGLE_CLIENT_ID_DEV
    VITE_GOOGLE_CLIENT_SECRET: $VITE_GOOGLE_CLIENT_SECRET_DEV
    VITE_PUBLIC_KEY: $VITE_PUBLIC_KEY_DEV
    VITE_IMAGE_BASE_URL: $VITE_IMAGE_BASE_URL_DEV
    VITE_FIREBASE_API_KEY: $VITE_FIREBASE_API_KEY_DEV
    VITE_FIREBASE_AUTH_DOMAIN: $VITE_FIREBASE_AUTH_DOMAIN_DEV
    VITE_FIREBASE_PROJECT_ID: $VITE_FIREBASE_PROJECT_ID_DEV
    VITE_FIREBASE_STORAGE_BUCKET: $VITE_FIREBASE_STORAGE_BUCKET_DEV
    VITE_FIREBASE_MESSAGING_SENDER_ID: $VITE_FIREBASE_MESSAGING_SENDER_ID_DEV
    VITE_FIREBASE_APP_ID: $VITE_FIREBASE_APP_ID_DEV
    VITE_FIREBASE_MEASUREMENT_ID: $VITE_FIREBASE_MEASUREMENT_ID_DEV
    VITE_FIREBASE_VAPID_KEY: $VITE_FIREBASE_VAPID_KEY_DEV
    VITE_IP_API_URL: $VITE_IP_API_URL_DEV
    VITE_NODE_ENV: $VITE_NODE_ENV_DEV
  script:
    - echo "Installing dependencies..."
    - npm install --legacy-peer-deps
    - echo "Building the project..."
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - develop

# Build the stag project
build_stag:
  stage: build_stag
  image: node:20
  variables:
    VITE_BASE_URL: $VITE_BASE_URL_STAG
    VITE_FACEBOOK_APP_ID: $VITE_FACEBOOK_APP_ID_STAG
    VITE_FACEBOOK_CLIENT_SECRET: $VITE_FACEBOOK_CLIENT_SECRET_STAG
    VITE_GOOGLE_CLIENT_ID: $VITE_GOOGLE_CLIENT_ID_STAG
    VITE_GOOGLE_CLIENT_SECRET: $VITE_GOOGLE_CLIENT_SECRET_STAG
    VITE_PUBLIC_KEY: $VITE_PUBLIC_KEY_STAG
    VITE_IMAGE_BASE_URL: $VITE_IMAGE_BASE_URL_STAG
    VITE_FIREBASE_API_KEY: $VITE_FIREBASE_API_KEY_STAG
    VITE_FIREBASE_AUTH_DOMAIN: $VITE_FIREBASE_AUTH_DOMAIN_STAG
    VITE_FIREBASE_PROJECT_ID: $VITE_FIREBASE_PROJECT_ID_STAG
    VITE_FIREBASE_STORAGE_BUCKET: $VITE_FIREBASE_STORAGE_BUCKET_STAG
    VITE_FIREBASE_MESSAGING_SENDER_ID: $VITE_FIREBASE_MESSAGING_SENDER_ID_STAG
    VITE_FIREBASE_APP_ID: $VITE_FIREBASE_APP_ID_STAG
    VITE_FIREBASE_MEASUREMENT_ID: $VITE_FIREBASE_MEASUREMENT_ID_STAG
    VITE_FIREBASE_VAPID_KEY: $VITE_FIREBASE_VAPID_KEY_STAG
    VITE_IP_API_URL: $VITE_IP_API_URL_STAG
    VITE_NODE_ENV: $VITE_NODE_ENV_STAG

  script:
    - echo "Installing dependencies..."
    - npm install --legacy-peer-deps
    - echo "Building the project..."
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - stage

# Build the prod project
build_prod:
  stage: build_prod
  image: node:20
  variables:
    VITE_BASE_URL: $VITE_BASE_URL_PROD
    VITE_FACEBOOK_APP_ID: $VITE_FACEBOOK_APP_ID_PROD
    VITE_FACEBOOK_CLIENT_SECRET: $VITE_FACEBOOK_CLIENT_SECRET_PROD
    VITE_GOOGLE_CLIENT_ID: $VITE_GOOGLE_CLIENT_ID_PROD
    VITE_GOOGLE_CLIENT_SECRET: $VITE_GOOGLE_CLIENT_SECRET_PROD
    VITE_PUBLIC_KEY: $VITE_PUBLIC_KEY_PROD
    VITE_IMAGE_BASE_URL: $VITE_IMAGE_BASE_URL_PROD
    VITE_FIREBASE_API_KEY: $VITE_FIREBASE_API_KEY_PROD
    VITE_FIREBASE_AUTH_DOMAIN: $VITE_FIREBASE_AUTH_DOMAIN_PROD
    VITE_FIREBASE_PROJECT_ID: $VITE_FIREBASE_PROJECT_ID_PROD
    VITE_FIREBASE_STORAGE_BUCKET: $VITE_FIREBASE_STORAGE_BUCKET_PROD
    VITE_FIREBASE_MESSAGING_SENDER_ID: $VITE_FIREBASE_MESSAGING_SENDER_ID_PROD
    VITE_FIREBASE_APP_ID: $VITE_FIREBASE_APP_ID_PROD
    VITE_FIREBASE_MEASUREMENT_ID: $VITE_FIREBASE_MEASUREMENT_ID_PROD
    VITE_FIREBASE_VAPID_KEY: $VITE_FIREBASE_VAPID_KEY_PROD
    VITE_IP_API_URL: $VITE_IP_API_URL_PROD
    VITE_NODE_ENV: $VITE_NODE_ENV_PROD

  script:
    - echo "Installing dependencies..."
    - npm install --legacy-peer-deps
    - echo "Building the project..."
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - production

# Deploy to Development
deploy_dev:
  stage: deploy_dev
  image: amazonlinux:latest
  script:
    - echo "Deploying to development environment..."
    - yum install -y aws-cli  
    - aws --version 
    - aws s3 rm s3://$S3_BUCKET_DEV --recursive
    - aws s3 sync dist/ s3://$S3_BUCKET_DEV/
    - echo "Invalidating CloudFront Cache for development..."
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID_DEV --paths "/*"
  environment:
    name: development
    url: https://$S3_BUCKET_DEV
  only:
    - develop
  dependencies:
    - build_dev

# Deploy to Staging
deploy_stag:
  stage: deploy_stag
  image: amazonlinux:latest
  script:
    - echo "Deploying to staging environment..."
    - echo "S3 Bucket STAG - $S3_BUCKET_STAG"
    - yum install -y aws-cli  
    - aws --version 
    - aws s3 rm s3://$S3_BUCKET_STAG --recursive
    - aws s3 sync dist/ s3://$S3_BUCKET_STAG/
    - echo "Invalidating CloudFront Cache for staging..."
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID_STAG --paths "/*"
  environment:
    name: staging
    url: https://$S3_BUCKET_STAG
  only:
    - stage
  dependencies:
    - build_stag

# Deploy to Production
deploy_prod:
  stage: deploy_prod
  image: amazonlinux:latest
  script:
    - echo "Deploying to production environment..."
    - echo "S3 Bucket PROD - $S3_BUCKET_PROD"
    - yum install -y aws-cli  
    - aws --version
    - aws s3 rm s3://$S3_BUCKET_PROD --recursive
    - aws s3 sync dist/ s3://$S3_BUCKET_PROD/
    - echo "Invalidating CloudFront Cache for production..."
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID_PROD --paths "/*"
  environment:
    name: production
    url: https://$S3_BUCKET_PROD
  only:
    - production
  dependencies:
    - build_prod